<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #f4f4f4;
    }

    /* Navbar */
    .navbar {
      background-color: #2f2929;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      text-shadow:
        1px 1px 0 #ccc,
        2px 2px 0 #bbb,
        3px 3px 0 #aaa,
        4px 4px 0 #999,
        5px 5px 10px rgba(0, 0, 0, 0.6);
    }

    /* Main container */
    .container {
      padding: 40px;
      text-align: center;
    }

    /* Card */
    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 1px 1px 0 #ccc,
        2px 2px 0 #bbb,
        3px 3px 0 #aaa,
        4px 4px 0 #999,
        5px 5px 10px rgba(0, 0, 0, 0.6);
    }

    /* Button */
    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
       font-weight: bold;
    color: #ffffff;
    box-shadow: 1px 1px 0 #ccc,
        2px 2px 0 #bbb,
        3px 3px 0 #aaa,
        4px 4px 0 #999,
        5px 5px 10px rgba(0, 0, 0, 0.6);
    text-shadow:
        1px 1px 0 #ccc,
        2px 2px 0 #bbb,
        3px 3px 0 #aaa,
        4px 4px 0 #999,
        5px 5px 10px rgba(0, 0, 0, 0.6);
    }
    h2{
        text-shadow:
        1px 1px 0 #ccc,
        2px 2px 0 #bbb,
        3px 3px 0 #aaa,
        4px 4px 0 #999,
        5px 5px 10px rgba(0, 0, 0, 0.6);
    }

    .btn:hover {
      background-color: #0056b3;
    }
    p{
        text-shadow:
        1px 1px 0 #ccc,
        2px 2px 0 #bbb,
        3px 3px 0 #aaa,
        4px 4px 0 #999,
        5px 5px 10px rgba(0, 0, 0, 0.6);
        color:bold;
        font-size: 20px;
    }
  </style>
</head>
<body>

  <div class="navbar">
    My Dashboard
  </div>

  <div class="container">
    <div class="card">
      <h2>Hiiii 👋</h2>
      <p>Create your portfolio easily</p>

      <a href="/portfolio-form">
        <button class="btn">Create Portfolio</button>
      </a>
    </div>
  </div>

</body>
</html>
